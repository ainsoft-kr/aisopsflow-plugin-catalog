type: object
required:
  - api_version
  - name
  - publisher
  - plugin_version
  - image
  - compatibility
  - capabilities
properties:
  api_version:
    type: string
    const: v1
  name:
    type: string
    min_length: 1
  publisher:
    type: string
    min_length: 1
  plugin_version:
    type: string
    min_length: 1
  image:
    type: string
    pattern: '.+(:[A-Za-z0-9._-]+|@sha256:[a-fA-F0-9]{64})$'
  compatibility:
    type: object
    required:
      - min_core
      - min_runner
      - runner_plugin_api
    properties:
      min_core:
        type: string
        min_length: 1
      min_runner:
        type: string
        min_length: 1
      runner_plugin_api:
        type: string
        const: v1
  capabilities:
    type: array
    min_items: 1
    items:
      type: string
  verification:
    type: object
    required:
      - status
    properties:
      status:
        type: string
      signature_ref:
        type: string
        min_length: 1
      signed_image:
        type: object
        required:
          - scheme
          - identity
          - verified
          - issued_at
        properties:
          scheme:
            type: string
            min_length: 1
          identity:
            type: string
            min_length: 1
          verified:
            type: boolean
          issued_at:
            type: string
            min_length: 1
      vulnerabilities:
        type: object
        required:
          - scanner
          - critical
          - high
          - medium
          - low
          - scanned_at
          - report_ref
        properties:
          scanner:
            type: string
            min_length: 1
          critical:
            type: integer
          high:
            type: integer
          medium:
            type: integer
          low:
            type: integer
          scanned_at:
            type: string
            min_length: 1
          report_ref:
            type: string
            min_length: 1
